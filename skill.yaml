name: structured-ontology
version: 1.0.0
description: SQLite-based structured knowledge base with full-text search, graph queries, failure tracking, and namespaces.
author: workspace-coordinator
entry: skill.py:StructuredOntologySkill
config:
  db_path: "~/.openclaw/workspace/knowledge.db"
  default_namespace: "public"
  enable_version_control: true
methods:
  - add_node
  - get_node
  - delete_node
  - list_nodes
  - add_edge
  - get_edge
  - get_outgoing_edges
  - get_incoming_edges
  - delete_edge
  - set_property
  - get_property
  - get_all_properties
  - index_document
  - search
  - unindex_document
  - get_dependency_chain
  - get_impact_analysis
  - record_failure
  - get_failure_prevention
  - add_prevention_rule
  - get_unresolved_failures
  - resolve_failure
  - set_namespace_permissions
  - query_custom
  - vacuum
  - reindex
  - get_stats
